name: Build Qwen3.5-4B-Vision GGUF

on:
  workflow_dispatch:

jobs:
  build-gguf:
    runs-on: ubuntu-latest

    env:
      HF_MODEL_ID: "huihui-ai/Huihui-Qwen3.5-4B-Claude-4.6-Opus-abliterated"
      MODEL_DIR: "models/Qwen3.5-4B-Abliterated"
      GGUF_OUT_BASE: "Qwen3.5-4B-Abliterated"
      QUANT_TYPE: "Q4_K_M"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          swap-size-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Clone and build llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git
          cmake -S llama.cpp -B llama.cpp/build -DCMAKE_BUILD_TYPE=Release -DLLAMA_BUILD_TOOLS=ON
          cmake --build llama.cpp/build --config Release -j"$(nproc)"

      - name: Install Python deps
        run: |
          python3 -m venv models/venv
          source models/venv/bin/activate
          python3 -m pip install --no-cache-dir --upgrade pip setuptools wheel
          # Ставим последние версии для поддержки Qwen2-VL
          python3 -m pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          python3 -m pip install --no-cache-dir transformers>=4.45.0 tokenizers>=0.20.0 huggingface_hub gguf
          python3 -m pip install --no-cache-dir -r llama.cpp/requirements.txt

      - name: Download Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source models/venv/bin/activate
          python3 -c "from huggingface_hub import snapshot_download; import os; snapshot_download(repo_id=os.environ['HF_MODEL_ID'], local_dir=os.environ['MODEL_DIR'], token=os.getenv('HF_TOKEN'), ignore_patterns=['*.msgpack', '*.h5', '*.bin'])"

      - name: Convert Vision Model to GGUF
        run: |
          source models/venv/bin/activate
          # Для Qwen2-VL используем специальный конвертер
          python3 llama.cpp/convert_hf_to_gguf.py \
            "${MODEL_DIR}" \
            --outfile "models/${GGUF_OUT_BASE}-F16.gguf" \
            --outtype f16

      - name: Quantize to ${{ env.QUANT_TYPE }}
        run: |
          llama.cpp/build/bin/llama-quantize \
            "models/${GGUF_OUT_BASE}-F16.gguf" \
            "models/${GGUF_OUT_BASE}-${QUANT_TYPE}.gguf" \
            "${QUANT_TYPE}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GGUF_OUT_BASE }}-GGUF
          path: models/*.gguf
